<!DOCTYPE html>
<html lang="th" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Laundry Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Sarabun', 'sans-serif'], } } }
        }
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
    <style>
        body { transition: background-color 0.3s ease, color 0.3s ease; -webkit-tap-highlight-color: transparent; }
        @keyframes slow-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-slow-spin { animation: slow-spin 12s linear infinite; }
        .glass-card { backdrop-filter: blur(8px); background: rgba(255, 255, 255, 0.8); }
        .dark .glass-card { background: rgba(30, 41, 59, 0.8); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-800 dark:bg-slate-900 dark:text-slate-100 min-h-screen pb-10">

    <header class="sticky top-0 z-50 glass-card border-b border-slate-200 dark:border-slate-700 shadow-sm px-4 md:px-6 py-3 mb-6">
        <div class="max-w-[1400px] mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <img src="Logo.png" alt="Logo" class="h-10 object-contain dark:brightness-110" onerror="this.style.display='none'">
                <div>
                    <h1 class="text-xl font-extrabold tracking-tight dark:text-white leading-tight">My Laundry (Wash & Dry)</h1>
                    <div class="flex items-center gap-2">
                        <span id="status-dot" class="w-2 h-2 rounded-full bg-emerald-500"></span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest" id="last-sync-display">อัปเดตล่าสุด: --:--</span>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <button id="theme-toggle" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-yellow-400 hover:scale-105 transition-all">
                    <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                    <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path></svg>
                </button>
                <div class="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-xl border border-slate-200 dark:border-slate-700">
                    <button id="view-user" class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-white dark:bg-slate-700 shadow-sm text-blue-600 dark:text-blue-400">USER</button>
                    <button id="view-admin" class="px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-500 dark:text-slate-400">ADMIN</button>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-[1400px] mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <aside class="lg:col-span-3">
            <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 shadow-sm border border-slate-100 dark:border-slate-700 sticky top-24">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">ภาพรวมระบบ</h3>
                <div class="space-y-4">
                    <div class="flex justify-between items-end">
                        <span class="text-sm font-bold text-slate-500">ว่างพร้อมใช้</span>
                        <span id="stat-ready" class="text-3xl font-black text-emerald-500">0</span>
                    </div>
                    <div class="flex justify-between items-end">
                        <span class="text-sm font-bold text-slate-500">กำลังทำงาน</span>
                        <span id="stat-busy" class="text-3xl font-black text-blue-500">0</span>
                    </div>
                    <div class="flex justify-between items-end">
                        <span class="text-sm font-bold text-slate-500">ซักเสร็จแล้ว</span>
                        <span id="stat-done" class="text-3xl font-black text-purple-500">0</span>
                    </div>
                </div>
            </div>
        </aside>

        <div class="lg:col-span-9 space-y-6">
            <section class="bg-white dark:bg-slate-800 p-5 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-700">
                <div class="flex items-center gap-2 mb-6">
                    <span class="p-2 bg-blue-50 dark:bg-blue-900/30 rounded-lg text-blue-500 text-sm">🌀</span>
                    <h2 class="text-lg font-bold tracking-tight">เครื่องซักผ้า (Washer)</h2>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="washer-zone"></div>
            </section>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <section class="bg-white dark:bg-slate-800 p-5 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-700">
                    <div class="flex items-center gap-2 mb-6">
                        <span class="p-2 bg-purple-50 dark:bg-purple-900/30 rounded-lg text-purple-500 text-sm">✨</span>
                        <h2 class="text-lg font-bold tracking-tight text-center">เครื่องซัก-อบ  All-in-one (AQUA)</h2>
                    </div>
                    <div class="grid grid-cols-2 gap-4" id="all-in-one-zone"></div>
                </section>

                <section class="bg-white dark:bg-slate-800 p-5 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-700">
                    <div class="flex items-center gap-2 mb-6">
                        <span class="p-2 bg-orange-50 dark:bg-orange-900/30 rounded-lg text-orange-500 text-sm">🔥</span>
                        <h2 class="text-lg font-bold tracking-tight">เครื่องอบผ้า (Dryer)</h2>
                    </div>
                    <div class="grid grid-cols-2 gap-4" id="dryer-zone"></div>
                </section>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

    const firebaseConfig = { databaseURL: "https://laundry-vending-system-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);
    
    let currentData = null;
    let isAdminMode = false;
    let liffUserId = null;         // userId จาก LINE LIFF
    let liffReady = false;         // LIFF init เสร็จแล้วหรือยัง
    const subscribedMachines = new Set(); // เก็บเครื่องที่ subscribe แล้ว

    // ============================================================
    // Persist subscriptions ใน localStorage (ไม่หายเมื่อ reload)
    // ============================================================
    function loadSavedSubscriptions() {
        try {
            const saved = JSON.parse(localStorage.getItem('mylaundry_subs') || '{}');
            Object.keys(saved).forEach(id => subscribedMachines.add(id));
        } catch(e) {}
    }

    function saveSubscription(machineId) {
        try {
            const saved = JSON.parse(localStorage.getItem('mylaundry_subs') || '{}');
            saved[machineId] = Date.now();
            localStorage.setItem('mylaundry_subs', JSON.stringify(saved));
        } catch(e) {}
    }

    function clearSubscription(machineId) {
        try {
            const saved = JSON.parse(localStorage.getItem('mylaundry_subs') || '{}');
            delete saved[machineId];
            localStorage.setItem('mylaundry_subs', JSON.stringify(saved));
        } catch(e) {}
    }

    // โหลด subscriptions ที่บันทึกไว้ก่อน
    loadSavedSubscriptions();

    // แก้ Race Condition: pre-add pendingSubscribe ก่อน Firebase render
    const _pendingAtLoad = sessionStorage.getItem('pendingSubscribe');
    if (_pendingAtLoad) subscribedMachines.add(_pendingAtLoad);

    // ============================================================
    // LIFF Initialization
    // ============================================================
    const LIFF_ID = '2009916510-BLfQGxyM';
    const LINE_OA = '@689vulep';

    async function initLiff() {
        try {
            await liff.init({ liffId: LIFF_ID });
            liffReady = true;
            console.log('✅ LIFF init สำเร็จ | isInClient:', liff.isInClient(), '| isLoggedIn:', liff.isLoggedIn());

            if (liff.isInClient() && liff.isLoggedIn()) {
                try {
                    // ลอง getDecodedIDToken ก่อน (เสถียรกว่าบน Android)
                    const idToken = liff.getDecodedIDToken();
                    if (idToken && idToken.sub) {
                        liffUserId = idToken.sub;
                    } else {
                        // fallback ไป getProfile
                        const profile = await liff.getProfile();
                        liffUserId = profile.userId;
                    }
                    console.log('✅ LIFF: Login แล้ว userId =', liffUserId.substring(0, 8) + '...');

                    // โหลด subscriptions จาก Firebase (แก้ปัญหา iOS localStorage ไม่ persist)
                    await loadUserSubscriptionsFromFirebase(liffUserId);

                    // Auto-subscribe หลัง liff.login() redirect กลับมา
                    const pendingMachine = sessionStorage.getItem('pendingSubscribe');
                    if (pendingMachine && liffUserId) {
                        sessionStorage.removeItem('pendingSubscribe');
                        showToast('กำลังลงทะเบียนแจ้งเตือน...', '⏳', 4000);
                        try {
                            await set(ref(database, `laundry_system/subscriptions/${pendingMachine}/${liffUserId}`), true);
                            subscribedMachines.add(pendingMachine);
                            saveSubscription(pendingMachine); // persist ใน localStorage
                            showToast('ลงทะเบียนแจ้งเตือนเรียบร้อยแล้วครับ!', '✅', 3000);
                            console.log('✅ Auto-subscribe สำเร็จ:', pendingMachine);
                        } catch(e) {
                            showToast('เกิดข้อผิดพลาด กรุณาลองใหม่', '❌', 3000);
                            console.error('❌ Auto-subscribe fail:', e);
                        }
                    }
                } catch (profileErr) {
                    console.warn('⚠️ ดึง userId ไม่ได้:', profileErr.message);
                }
            } else {
                console.log('ℹ️ LIFF: ยังไม่ได้ Login (เปิดนอก LINE)');
            }
        } catch (err) {
            console.warn('⚠️ LIFF init ไม่สำเร็จ (fallback mode):', err.message);
            liffReady = false;
        }
    }

    initLiff();

    // ข้อมูลความจุเครื่องตามที่ระบุ
    const machineCapacities = {
        'W1': '15KG', 
        'W2': '15KG', 
        'W3': '15KG', 
        'W4': '10KG',
        'AQUA9': '17KG', 
        'AQUA10': '27KG'
    };

    const themeToggleBtn = document.getElementById('theme-toggle');
    themeToggleBtn.addEventListener('click', () => {
        document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        updateThemeIcons();
    });

    function updateThemeIcons() {
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');
        if (document.documentElement.classList.contains('dark')) {
            lightIcon.classList.remove('hidden'); darkIcon.classList.add('hidden');
        } else {
            darkIcon.classList.remove('hidden'); lightIcon.classList.add('hidden');
        }
    }
    updateThemeIcons();

    document.getElementById('view-user').onclick = () => toggleMode(false);
    document.getElementById('view-admin').onclick = () => toggleMode(true);

    function toggleMode(admin) {
        isAdminMode = admin;
        document.getElementById('view-user').className = !admin ? "px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-white dark:bg-slate-700 shadow-sm text-blue-600 dark:text-blue-400" : "px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-500 dark:text-slate-400";
        document.getElementById('view-admin').className = admin ? "px-4 py-1.5 rounded-lg text-xs font-bold transition-all bg-white dark:bg-slate-700 shadow-sm text-blue-600 dark:text-blue-400" : "px-4 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-500 dark:text-slate-400";
        render();
    }

    // ============================================================
    // โหลด subscriptions จาก Firebase ตาม userId
    // แก้ปัญหา iOS LIFF ที่ localStorage ไม่ persist ระหว่าง sessions
    // ============================================================
    async function loadUserSubscriptionsFromFirebase(userId) {
        try {
            const subsSnap = await get(ref(database, 'laundry_system/subscriptions'));
            if (subsSnap.exists()) {
                const allSubs = subsSnap.val();
                Object.keys(allSubs).forEach(machineId => {
                    if (allSubs[machineId] && allSubs[machineId][userId] === true) {
                        subscribedMachines.add(machineId);
                        saveSubscription(machineId); // sync กลับไป localStorage ด้วย
                        console.log('✅ Found active subscription:', machineId);
                    }
                });
            }
        } catch(e) {
            console.warn('⚠️ โหลด subscriptions จาก Firebase ไม่ได้:', e.message);
        }
    }

    // ============================================================
    // showLineModal — แสดง modal บอก user ให้พิมพ์ข้อความใน LINE OA
    // ============================================================
    function showLineModal(machineId) {
        const text = 'แจ้งเตือน ' + machineId;
        document.getElementById('modal-text').textContent = text;

        // ปุ่ม copy
        document.getElementById('modal-copy-btn').onclick = () => {
            navigator.clipboard.writeText(text).then(() => {
                document.getElementById('modal-copy-btn').innerHTML = '✅ คัดลอกแล้ว!';
                setTimeout(() => {
                    document.getElementById('modal-copy-btn').innerHTML = '📋 คัดลอกข้อความ';
                }, 2000);
            }).catch(() => {
                // fallback สำหรับ browser ที่ไม่รองรับ clipboard
                document.getElementById('modal-text').select?.();
            });
        };

        // ปุ่มเปิด LINE OA — save optimistically ก่อนเปิด LINE
        document.getElementById('modal-open-btn').onclick = () => {
            subscribedMachines.add(machineId);
            saveSubscription(machineId); // save ก่อน เพื่อให้จำสถานะตอน reload
            closeLineModal();
            window.location.href = 'https://line.me/R/oaMessage/@689vulep';
        };

        document.getElementById('line-modal').classList.remove('hidden');
    }

    window.closeLineModal = () => {
        document.getElementById('line-modal').classList.add('hidden');
    };

    // ============================================================
    // Toast Notification
    // ============================================================
    function showToast(msg, icon = '⏳', duration = 3000) {
        const toast = document.getElementById('toast-notify');
        document.getElementById('toast-icon').textContent = icon;
        document.getElementById('toast-msg').textContent = msg;
        toast.classList.remove('hidden');
        setTimeout(() => toast.classList.add('hidden'), duration);
    }

    // ============================================================
    // notifyMe — LIFF 1-Tap หรือ Deep Link (fallback)
    // ============================================================
    const MACHINE_NAMES_TH = {
        'W1': 'เครื่องซัก 1', 'W2': 'เครื่องซัก 2',
        'W3': 'เครื่องซัก 3', 'W4': 'เครื่องซัก 4',
        'D5': 'เครื่องอบ 5',  'D6': 'เครื่องอบ 6',
        'D7': 'เครื่องอบ 7',  'D8': 'เครื่องอบ 8',
    };

    window.notifyMe = async (machineId, displayName) => {
        const btn = document.querySelector(`[data-notify="${machineId}"]`);

        // --- เส้นทาง 1: LIFF ใน LINE + มี userId → 1-Tap Firebase ---
        if (liffReady && liff.isInClient() && liffUserId) {
            try {
                if (btn) { btn.disabled = true; btn.innerHTML = '⏳ กำลังลงทะเบียน...'; }
                await set(ref(database, `laundry_system/subscriptions/${machineId}/${liffUserId}`), true);
                subscribedMachines.add(machineId);
                saveSubscription(machineId); // persist ใน localStorage
                if (btn) {
                    btn.disabled = true;
                    btn.innerHTML = '✅ ลงทะเบียนแล้ว!';
                    btn.className = 'mt-2 w-full flex items-center justify-center gap-1.5 px-3 py-1.5 rounded-xl text-[11px] font-bold bg-slate-100 dark:bg-slate-800 text-slate-400 dark:text-slate-500 border border-slate-200 dark:border-slate-700 cursor-not-allowed';
                }
                console.log('✅ LIFF 1-Tap สำเร็จ:', machineId);
            } catch (err) {
                console.error('❌ Firebase error:', err.code, err.message);
                if (btn) { btn.disabled = false; btn.innerHTML = '🔔 แจ้งเตือนฉัน'; }
                showLineModal(machineId);
            }
            return;
        }

        // --- เส้นทาง 2: อยู่ใน LINE แต่ไม่มี userId → Login ก่อน แล้ว auto-subscribe ---
        if (liffReady && liff.isInClient()) {
            console.log('ℹ️ อยู่ใน LINE แต่ไม่มี userId → บันทึก pending แล้ว login');
            sessionStorage.setItem('pendingSubscribe', machineId);
            liff.login();
            return;
        }

        // --- เส้นทาง 3: เปิดนอก LINE → แสดง modal ---
        console.log('ℹ️ เปิดนอก LINE → แสดง modal');
        showLineModal(machineId);
    };


function createMachineHTML(name, info) {
        const isAqua = name.includes('AQUA') || name.includes('ซัก-อบ');
        const isWasher = name.includes('W') || name.includes('เครื่องซัก');
        const num = name.replace(/\D/g,''); // ดึงเฉพาะตัวเลขออกมา
        
        // Logic ใหม่: จับคู่ความจุด้วยตัวเลขลำดับเครื่อง
        let capacityText = "";
        if (isWasher && !isAqua) {
            if (num === "1" || num === "2" || num === "3") capacityText = "15KG";
            else if (num === "4") capacityText = "10KG";
        } else if (isAqua) {
            if (num === "9") capacityText = "17KG";
            else if (num === "10") capacityText = "27KG";
        }
        
        let displayName = isAqua ? `เครื่องซัก-อบ ${num}` : (isWasher ? `เครื่องซัก ${num}` : `เครื่องอบ ${num}`);
        
        const cardHeight = isAqua ? 'h-52 md:h-64' : 'min-h-[13rem]'; 
        const svgSize = isAqua ? 'w-24 h-24 md:w-32 md:h-32' : 'w-16 h-16';
        const radius = isAqua ? 42 : 28;
        const viewBox = isAqua ? "0 0 100 100" : "0 0 80 80";
        const center = isAqua ? 50 : 40;
        const circ = 2 * Math.PI * radius;

        const getStatusColor = (info, isWasher) => {
            if (!info || info.status?.toLowerCase() === 'offline') return 'slate-400';
            const status = info.status.toLowerCase();
            const isBusy = info.finish_at && Date.parse(info.finish_at) > Date.now();
            if (isBusy) return isWasher ? 'blue-500' : 'orange-500';
            if (status === 'busy') return isWasher ? 'blue-500' : 'orange-500';
            if (status === 'complete') return 'purple-500';
            if (status === 'error' || status === 'outoforder') return 'red-500';
            if (status === 'unavailable') return 'slate-400';
            if (status === 'readytostart') return 'yellow-500';
            return 'emerald-500';
        };

        // ตรวจสอบ: countdown ถึง 0 แต่ Firebase ยังไม่อัปเดต
        const isBusy = info && info.finish_at && Date.parse(info.finish_at) > Date.now();
        const isUpdating = info && !isBusy && info.status?.toLowerCase() === 'busy';

        // คำนวณเวลาเสร็จ (Issue 3)
        const finishTimeStr = (info && info.finish_at && isBusy) ? (() => {
            const d = new Date(Date.parse(info.finish_at));
            const h = d.getHours().toString().padStart(2,'0');
            const m = d.getMinutes().toString().padStart(2,'0');
            return h + ':' + m + ' น.';
        })() : null;

        const themeColor = getStatusColor(info, isWasher);

        // Template สำหรับ Card
        return `
            <div class="bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-700 rounded-2xl overflow-hidden shadow-sm transition-all flex flex-col ${cardHeight} ${(!info || info.status?.toLowerCase() === 'offline') ? 'opacity-60' : ''}">
                <div class="bg-${themeColor} py-1.5 text-center text-[14px] font-black text-white uppercase tracking-tight">${displayName}</div>
                <div class="flex-grow flex flex-col items-center justify-center p-3">
                    
                    <div class="flex items-center gap-1.5 mb-2">
                        ${capacityText ? `<div class="text-[12px] font-black text-${themeColor} tracking-widest px-2 py-0.5 rounded-md border border-${themeColor}/20 bg-${themeColor}/5">${capacityText}</div>` : '<div class="h-[26px]"></div>'}
                        ${(info && info.price > 0) ? `<div class="text-[11px] font-bold text-slate-400 dark:text-slate-500 px-2 py-0.5 rounded-md bg-slate-100 dark:bg-slate-800">฿${info.price}</div>` : ''}
                    </div>
                    
                    <div class="relative ${svgSize} mb-2">
                        <svg viewBox="${viewBox}" class="w-full h-full">
                            <circle cx="${center}" cy="${center}" r="${radius}" stroke="currentColor" class="text-slate-100 dark:text-slate-800" stroke-width="${isAqua ? 6 : 4}" fill="transparent"/>
                            ${(info && info.status?.toLowerCase() !== 'offline') ? `
                            <circle id="circle-${name}" cx="${center}" cy="${center}" r="${radius}" stroke="currentColor" class="text-${themeColor} transition-all duration-1000" stroke-width="${isAqua ? 6 : 4}" fill="transparent"
                                stroke-dasharray="${circ}" stroke-dashoffset="${isBusy ? circ * (1 - (1 - ((Date.parse(info.finish_at) - Date.now()) / (30 * 60000)))) : 0}" stroke-linecap="round" style="transform: rotate(-90deg); transform-origin: center;"/>
                            ` : ''}
                        </svg>
                        <div id="timer-${name}" class="absolute inset-0 flex items-center justify-center ${isAqua ? 'text-1xl' : 'text-[11px]'} font-black">
                            ${(!info || info.status?.toLowerCase() === 'offline') ? 'OFFLINE' : ( isBusy ? 
                                `${Math.floor((Date.parse(info.finish_at) - Date.now()) / 60000)}:${String(Math.floor(((Date.parse(info.finish_at) - Date.now()) % 60000) / 1000)).padStart(2,'0')}` : 
                                (() => {
                                    const st = info.status?.toLowerCase();
                                    if (isUpdating || st === 'busy') return 'DONE';
                                    if (st === 'complete') return 'DONE';
                                    if (st === 'error') return 'ERR';
                                    if (st === 'outoforder' || st === 'unavailable') return 'OFF';
                                    if (st === 'readytostart') return 'START';
                                    return 'READY';
                                })() )}
                        </div>
                    </div>
                    <div class="text-[11px] font-bold text-slate-500 dark:text-slate-400">
                        ${(!info || info.status?.toLowerCase() === 'offline') ? 'รอเชื่อมต่อระบบ' : ( isBusy ? (isWasher ? 'กำลังซัก...' : 'กำลังอบ...') : (isUpdating ? 'กำลังอัปเดต...' : (() => {
                            const st = info.status?.toLowerCase();
                            if (st === 'complete') return 'รอนำผ้าออก';
                            if (st === 'error') return 'เครื่อง Error';
                            if (st === 'outoforder') return 'งดให้บริการชั่วคราว';
                            if (st === 'unavailable') return 'งดให้บริการชั่วคราว';
                            if (st === 'readytostart') return 'กรุณากดปุ่ม START';
                            return 'ว่างพร้อมใช้';
                        })()) )}
                    </div>
                    ${finishTimeStr ? `<div class="text-[10px] text-slate-400 dark:text-slate-500 mt-0.5">เสร็จ ${finishTimeStr}</div>` : ''}
                    ${(info && (info.finish_at && Date.parse(info.finish_at) > Date.now()) && !isAqua) ? (
                        subscribedMachines.has(name) ? `
                    <button disabled
                        class="mt-2 w-full flex items-center justify-center gap-1.5 px-3 py-1.5 rounded-xl text-[11px] font-bold
                               bg-slate-100 dark:bg-slate-800 text-slate-400 dark:text-slate-500
                               border border-slate-200 dark:border-slate-700 cursor-not-allowed">
                        ✅ ลงทะเบียนแล้ว!
                    </button>` : `
                    <button data-notify="${name}" onclick="notifyMe('${name}', '${displayName}')"
                        class="mt-2 w-full flex items-center justify-center gap-1.5 px-3 py-1.5 rounded-xl text-[11px] font-bold
                               bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400
                               border border-emerald-200 dark:border-emerald-700
                               hover:bg-emerald-100 dark:hover:bg-emerald-900/50 active:scale-95 transition-all">
                        🔔 แจ้งเตือนฉัน
                    </button>`) : ''}
                </div>
            </div>`;
    }

    function render() {
        if (!currentData) return;
        const names = Object.keys(currentData).sort((a,b) => a.localeCompare(b, undefined, {numeric: true}));
        
        document.getElementById('washer-zone').innerHTML = names.filter(n => n.startsWith('W')).map(n => createMachineHTML(n, currentData[n])).join('');
        document.getElementById('all-in-one-zone').innerHTML = ['AQUA9', 'AQUA10'].map(n => createMachineHTML(n, currentData[n] || {status:'offline'})).join('');
        
        // สลับตำแหน่ง D6 และ D7
        const dryerNames = names.filter(n => n.startsWith('D'));
        const idx6 = dryerNames.indexOf('D6');
        const idx7 = dryerNames.indexOf('D7');
        if (idx6 !== -1 && idx7 !== -1) {
            [dryerNames[idx6], dryerNames[idx7]] = [dryerNames[idx7], dryerNames[idx6]];
        }
        document.getElementById('dryer-zone').innerHTML = dryerNames.map(n => createMachineHTML(n, currentData[n])).join('');

        let stats = { ready: 0, busy: 0, done: 0 };
        names.forEach(n => {
            if (n.startsWith('AQUA')) return;
            const info = currentData[n];
            const busy = info.finish_at && Date.parse(info.finish_at) > Date.now();
            if (busy) stats.busy++; else if (info.status.toLowerCase() === 'complete') stats.done++; else stats.ready++;
        });
        document.getElementById('stat-ready').innerText = stats.ready;
        document.getElementById('stat-busy').innerText = stats.busy;
        document.getElementById('stat-done').innerText = stats.done;
    }

    // อ่าน machines — path ที่มีสิทธิ์อ่าน
    onValue(ref(database, 'laundry_system/machines'), (snap) => {
        currentData = snap.val();
        if (currentData) {
            Object.keys(currentData).forEach(machineId => {
                const info = currentData[machineId];
                const isBusy = info && info.finish_at && Date.parse(info.finish_at) > Date.now();
                if (!isBusy && subscribedMachines.has(machineId)) {
                    subscribedMachines.delete(machineId);
                    clearSubscription(machineId);
                }
            });
        }
        render();
    }, (error) => {
        console.error('❌ Firebase machines permission denied:', error.message);
        document.getElementById('last-sync-display').innerText = '⚠️ ไม่สามารถเชื่อมต่อ Firebase ได้';
    });

    onValue(ref(database, 'laundry_system/last_sync'), (snap) => {
        const lastSync = snap.val();
        if (lastSync) {
            const timePart = lastSync.split(' ')[1] || lastSync;
            document.getElementById('last-sync-display').innerText = `อัปเดตล่าสุด: ${timePart}`;
        }
    }, (error) => {
        console.error('❌ Firebase last_sync permission denied:', error.message);
    });

    // ============================================================
    // tickCountdown: อัปเดตเฉพาะ countdown ทุก 1 วินาที
    // ไม่ re-render DOM ทั้งหมด ประหยัด CPU มากขึ้น
    // ============================================================
    function tickCountdown() {
        if (!currentData) return;
        Object.keys(currentData).forEach(name => {
            const info = currentData[name];
            if (!info || !info.finish_at) return;
            const remaining = Date.parse(info.finish_at) - Date.now();
            const timerEl = document.getElementById('timer-' + name);
            const circleEl = document.getElementById('circle-' + name);
            if (!timerEl) return;

            const isWasher = name.startsWith('W');
            const radius = 28;
            const circ = 2 * Math.PI * radius;

            if (remaining > 0) {
                const m = Math.floor(remaining / 60000);
                const s = Math.floor((remaining % 60000) / 1000);
                timerEl.textContent = m + ':' + String(s).padStart(2, '0');
                if (circleEl) {
                    const offset = circ * (1 - (1 - (remaining / (30 * 60000))));
                    circleEl.style.strokeDashoffset = Math.max(0, offset);
                }
            } else {
                // countdown ถึง 0 → แสดง DONE รอ Firebase อัปเดต
                if (info.status?.toLowerCase() === 'busy') {
                    timerEl.textContent = 'DONE';
                    if (circleEl) circleEl.style.strokeDashoffset = 0;
                }
            }
        });

        // อัปเดต stats bar ด้วย
        if (currentData) {
            let stats = { ready: 0, busy: 0, done: 0 };
            Object.keys(currentData).forEach(n => {
                if (n.startsWith('AQUA')) return;
                const info = currentData[n];
                if (!info) return;
                const busy = info.finish_at && Date.parse(info.finish_at) > Date.now();
                if (busy) stats.busy++;
                else if (info.status?.toLowerCase() === 'complete' || info.status?.toLowerCase() === 'busy') stats.done++;
                else stats.ready++;
            });
            const rEl = document.getElementById('stat-ready');
            const bEl = document.getElementById('stat-busy');
            const dEl = document.getElementById('stat-done');
            if (rEl) rEl.innerText = stats.ready;
            if (bEl) bEl.innerText = stats.busy;
            if (dEl) dEl.innerText = stats.done;
        }
    }

    // render() เรียกเฉพาะตอน Firebase อัปเดต
    // tickCountdown() เรียกทุก 1 วินาทีสำหรับนับถอยหลัง
    setInterval(tickCountdown, 1000);
</script>
    <!-- Toast Notification -->
    <div id="toast-notify" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-50
         bg-slate-800 dark:bg-slate-700 text-white text-sm font-bold
         px-5 py-3 rounded-2xl shadow-xl flex items-center gap-2 whitespace-nowrap">
        <span id="toast-icon">⏳</span>
        <span id="toast-msg">กำลังลงทะเบียนแจ้งเตือน...</span>
    </div>

    <!-- Instruction Modal สำหรับ Deep Link fallback -->
    <div id="line-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center px-6"
         style="background:rgba(0,0,0,0.7)">
        <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 w-full max-w-sm shadow-2xl text-center">
            <div class="text-3xl mb-3">📱</div>
            <h3 class="text-base font-bold text-slate-800 dark:text-white mb-2">แจ้งเตือนผ่าน LINE</h3>
            <p class="text-sm text-slate-500 dark:text-slate-400 mb-4">พิมพ์ข้อความนี้ใน LINE OA แล้วกด Send</p>
            <div id="modal-text"
                 class="bg-emerald-50 dark:bg-emerald-900/30 border border-emerald-200 dark:border-emerald-700
                        rounded-xl px-4 py-3 text-lg font-bold text-emerald-700 dark:text-emerald-300 mb-2 select-all">
            </div>
            <button id="modal-copy-btn"
                class="w-full mb-3 py-2 rounded-xl text-xs font-bold bg-slate-100 dark:bg-slate-700
                       text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-slate-600">
                📋 คัดลอกข้อความ
            </button>
            <div class="flex gap-3">
                <button onclick="closeLineModal()"
                    class="flex-1 py-2.5 rounded-xl text-sm font-bold border border-slate-200 dark:border-slate-600
                           text-slate-500 dark:text-slate-400">
                    ยกเลิก
                </button>
                <button id="modal-open-btn"
                    class="flex-1 py-2.5 rounded-xl text-sm font-bold bg-emerald-500 text-white">
                    เปิด LINE OA
                </button>
            </div>
        </div>
    </div>

</body>
